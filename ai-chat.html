<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - Clitus PC</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0ff;height:100vh;display:flex;flex-direction:column}
header{background:rgba(255,255,255,.05);border-bottom:1px solid rgba(102,126,234,.2);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
header a{color:#e0e0ff;text-decoration:none;font-size:.85rem;opacity:.7}
header a:hover{opacity:1}
.logo{font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.model-badge{margin-left:auto;background:rgba(102,126,234,.15);border:1px solid rgba(102,126,234,.3);color:#a78bfa;border-radius:50px;padding:.25rem .75rem;font-size:.75rem;font-weight:700}
.chat-area{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;max-width:800px;width:100%;margin:0 auto}
.msg{display:flex;gap:.75rem;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.avatar.ai{background:linear-gradient(135deg,#667eea,#764ba2)}
.avatar.user{background:linear-gradient(135deg,#f093fb,#f5576c)}
.bubble{max-width:80%;padding:.85rem 1.1rem;border-radius:16px;line-height:1.65;font-size:.92rem;white-space:pre-wrap;word-break:break-word}
.msg.ai .bubble{background:rgba(255,255,255,.06);border:1px solid rgba(102,126,234,.15)}
.msg.user .bubble{background:linear-gradient(135deg,rgba(102,126,234,.3),rgba(118,75,162,.3));border:1px solid rgba(102,126,234,.3)}
.typing{display:flex;gap:4px;padding:.5rem 0}
.typing span{width:8px;height:8px;border-radius:50%;background:#667eea;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.input-area{background:rgba(255,255,255,.04);border-top:1px solid rgba(102,126,234,.15);padding:1rem 1.5rem;flex-shrink:0}
.input-wrap{max-width:800px;margin:0 auto;display:flex;gap:.75rem;align-items:flex-end;background:rgba(255,255,255,.06);border:1.5px solid rgba(102,126,234,.25);border-radius:16px;padding:.75rem 1rem;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(102,126,234,.6)}
textarea{flex:1;background:none;border:none;outline:none;color:#e0e0ff;font-size:.95rem;font-family:inherit;resize:none;max-height:150px;line-height:1.5}
textarea::placeholder{color:rgba(255,255,255,.3)}
.send-btn{background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.quick-btns{max-width:800px;margin:.5rem auto 0;display:flex;gap:.5rem;flex-wrap:wrap}
.quick-btn{background:rgba(102,126,234,.1);border:1px solid rgba(102,126,234,.2);color:#a78bfa;border-radius:50px;padding:.3rem .85rem;font-size:.78rem;cursor:pointer;transition:all .2s}
.quick-btn:hover{background:rgba(102,126,234,.2);color:#fff}
.welcome{text-align:center;padding:3rem 1rem;opacity:.6}
.welcome h2{font-size:1.5rem;margin-bottom:.5rem}
.welcome p{font-size:.9rem}
</style>
</head>
<body>
<header>
  <a href="index.html"><i class="fas fa-arrow-left"></i></a>
  <span class="logo">💻 Clitus AI</span>
  <span class="model-badge">GPT-4o mini</span>
</header>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div style="font-size:3rem;margin-bottom:.75rem">🤖</div>
    <h2>Xin chào! Tôi là Clitus AI</h2>
    <p>Hỏi bất cứ điều gì — code, bài tập, ý tưởng, dịch thuật...</p>
  </div>
</div>

<div class="input-area">
  <div class="quick-btns">
    <button class="quick-btn" onclick="quickAsk('Fix code này giúp tôi')">🔧 Fix Code</button>
    <button class="quick-btn" onclick="quickAsk('Giải bài tập toán này')">📐 Giải Toán</button>
    <button class="quick-btn" onclick="quickAsk('Dịch sang tiếng Anh')">🌐 Dịch</button>
    <button class="quick-btn" onclick="quickAsk('Viết CV cho tôi')">📄 Tạo CV</button>
    <button class="quick-btn" onclick="quickAsk('Review code này')">👁️ Review Code</button>
  </div>
  <div class="input-wrap">
    <textarea id="msgInput" placeholder="Nhập câu hỏi..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<script>
const history = [];
let sending = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function quickAsk(text) {
  document.getElementById('msgInput').value = text;
  sendMsg();
}

function addMsg(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="avatar ${role}">${role==='ai'?'🤖':'👤'}</div><div class="bubble">${escHtml(text)}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(102,126,234,.2);padding:1px 5px;border-radius:4px">$1</code>');
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = '<div class="avatar ai">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function sendMsg() {
  if (sending) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  sending = true;
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const r = await fetch('/api/gpt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-10), max_tokens: 1500 })
    });
    const d = await r.json();
    document.getElementById('typing')?.remove();
    if (!r.ok) throw new Error(d.error || 'Lỗi AI');
    const reply = d.content;
    history.push({ role: 'assistant', content: reply });
    addMsg('ai', reply);
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('ai', '❌ ' + e.message + ' — Vui lòng thử lại.');
  } finally {
    sending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
