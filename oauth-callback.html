<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Đang đăng nhập...</title>
<style>
body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0f0c29;color:#fff;flex-direction:column;gap:1rem;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:rgba(255,255,255,.6);font-size:.9rem;}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Đang xử lý đăng nhập Google...</p>
<script>
(async function() {
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error || !code) {
        location.href = '/?auth_error=' + encodeURIComponent(error || 'no_code');
        return;
    }

    try {
        const r = await fetch('/api/google-callback', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ code })
        });

        let d;
        try { d = await r.json(); } catch(e) {
            // API not ready yet — redirect to Google callback flow
            location.href = '/api/google-callback?code=' + encodeURIComponent(code);
            return;
        }

        if (d.token && d.user) {
            localStorage.setItem('user_token', d.token);
            localStorage.setItem('user_info', JSON.stringify(d.user));
            location.href = '/?auth_success=1';
        } else if (d.error) {
            location.href = '/?auth_error=' + encodeURIComponent(d.error);
        } else {
            location.href = '/?auth_error=login_failed';
        }
    } catch(e) {
        // Network error — try server-side callback
        location.href = '/api/google-callback?code=' + encodeURIComponent(code);
    }
})();
</script>
</body>
</html>
