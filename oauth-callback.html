<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Đang đăng nhập...</title>
<style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0f0c29;color:#fff;flex-direction:column;gap:1rem;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<div class="spinner"></div>
<p>Đang xử lý đăng nhập Google...</p>
<script>
(async function() {
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error || !code) {
        location.href = '/?auth_error=' + encodeURIComponent(error || 'no_code');
        return;
    }

    try {
        // Exchange code for tokens via server
        const r = await fetch('/api/auth/google-callback-ajax', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ code })
        });

        // If API fails (static serve), try direct approach
        if (!r.ok || r.headers.get('content-type')?.includes('javascript')) {
            throw new Error('api_static');
        }

        const d = await r.json();
        if (d.token && d.user) {
            localStorage.setItem('user_token', d.token);
            localStorage.setItem('user_info', JSON.stringify(d.user));
            location.href = '/?auth_success=1';
        } else {
            throw new Error(d.error || 'login_failed');
        }
    } catch(e) {
        if (e.message === 'api_static') {
            // Fallback: use Google token endpoint directly
            // Exchange code for access_token via CORS-enabled endpoint
            location.href = '/?auth_error=api_not_ready';
        } else {
            location.href = '/?auth_error=' + encodeURIComponent(e.message);
        }
    }
})();
</script>
</body>
</html>
