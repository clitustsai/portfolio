  .fg label { display:block; font-size:0.83rem; font-weight:700; color:var(--text); margin-bottom:0.4rem; }

    transition:border 0.2s; box-sizing:border-box; font-family:inherit;

  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color:#667eea; }
  .fg textarea { resize:vertical; min-height:100px; }
  .gen-btn {

    font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s;
