<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dịch Thuật - ClitusPC</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="mobile-responsive.css">
<link rel="stylesheet" href="mobile-ux.css">
<link rel="stylesheet" href="mobile-fix.css">

<link rel="stylesheet" href="ultra-modern.css">

<style>
:root {
  --g1:#667eea;--g2:#764ba2;
  --bg:#f8f9ff;--card:#fff;--text:#1a1a2e;--border:#e0e4ff;--sub:#888;
}
[data-theme="dark"] {
  --bg:#0f0f1a;--card:#1a1a2e;--text:#e0e0ff;--border:#2a2a4a;--sub:#aaa;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; }

.tr-header {
  background:linear-gradient(135deg,var(--g1),var(--g2));
  padding:1rem 1.5rem;
  display:flex; align-items:center; gap:1rem;
}
.tr-header a { color:#fff; text-decoration:none; font-size:1.1rem; opacity:.8; }
.tr-header h1 { color:#fff; font-size:1.2rem; font-weight:800; flex:1; }
.tr-header button { background:rgba(255,255,255,.2); border:none; color:#fff; padding:.4rem .8rem; border-radius:8px; cursor:pointer; font-size:.85rem; }

.tr-wrap { max-width:900px; margin:0 auto; padding:1.5rem 1rem; }

/* Lang selector bar */
.lang-bar {
  display:flex; align-items:center; gap:.5rem;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:16px; padding:.5rem .75rem; margin-bottom:1rem;
  box-shadow:0 2px 12px rgba(102,126,234,.08);
}
.lang-btn {
  flex:1; background:none; border:none; color:var(--text);
  font-size:.95rem; font-weight:600; padding:.5rem .75rem;
  border-radius:10px; cursor:pointer; transition:all .2s;
  text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.lang-btn.active { background:linear-gradient(135deg,var(--g1),var(--g2)); color:#fff; }
.lang-btn:hover:not(.active) { background:var(--border); }
.swap-btn {
  background:none; border:1.5px solid var(--border); color:var(--g1);
  width:36px; height:36px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; transition:all .2s; flex-shrink:0;
}
.swap-btn:hover { background:var(--g1); color:#fff; transform:rotate(180deg); }

/* Text areas */
.tr-panels { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
@media(max-width:600px) { .tr-panels { grid-template-columns:1fr; } }

.tr-panel {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:16px; overflow:hidden;
  box-shadow:0 2px 12px rgba(102,126,234,.08);
}
.tr-panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.6rem 1rem; border-bottom:1px solid var(--border);
  font-size:.8rem; font-weight:700; color:var(--sub);
}
.tr-panel-header select {
  background:none; border:none; color:var(--g1); font-weight:700;
  font-size:.85rem; cursor:pointer; outline:none;
}
.tr-textarea {
  width:100%; min-height:200px; padding:1rem;
  background:none; border:none; color:var(--text);
  font-size:1rem; line-height:1.6; resize:vertical; outline:none;
  font-family:inherit;
}
.tr-panel-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding:.5rem 1rem; border-top:1px solid var(--border);
}
.char-count { font-size:.75rem; color:var(--sub); }
.panel-actions { display:flex; gap:.4rem; }
.icon-btn {
  background:none; border:none; color:var(--sub); cursor:pointer;
  padding:.3rem .5rem; border-radius:8px; font-size:.9rem; transition:all .2s;
}
.icon-btn:hover { color:var(--g1); background:var(--border); }

/* Translate button */
.tr-btn-wrap { text-align:center; margin:1rem 0; }
.tr-btn {
  background:linear-gradient(135deg,var(--g1),var(--g2));
  color:#fff; border:none; padding:.75rem 2.5rem;
  border-radius:50px; font-size:1rem; font-weight:700;
  cursor:pointer; transition:all .2s;
  box-shadow:0 4px 15px rgba(102,126,234,.4);
}
.tr-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(102,126,234,.5); }
.tr-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

/* Quick langs */
.quick-langs {
  display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1rem;
}
.ql-btn {
  background:var(--card); border:1.5px solid var(--border);
  color:var(--text); padding:.3rem .8rem; border-radius:50px;
  font-size:.8rem; cursor:pointer; transition:all .2s;
}
.ql-btn:hover { border-color:var(--g1); color:var(--g1); }
.ql-btn.active { background:var(--g1); color:#fff; border-color:var(--g1); }

/* History */
.history-section { margin-top:1.5rem; }
.history-title { font-size:.9rem; font-weight:700; color:var(--sub); margin-bottom:.75rem; display:flex; align-items:center; justify-content:space-between; }
.history-item {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:.75rem 1rem; margin-bottom:.5rem;
  cursor:pointer; transition:all .2s;
}
.history-item:hover { border-color:var(--g1); }
.history-item .hi-src { font-size:.85rem; color:var(--sub); margin-bottom:.25rem; }
.history-item .hi-dst { font-size:.9rem; font-weight:600; }
.history-item .hi-langs { font-size:.7rem; color:var(--g1); font-weight:700; }

.loading-dots::after { content:'...'; animation:dots 1s infinite; }
@keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
</style>
</head>
<body>
<script src="dist/protect.js"></script>
<header>
  <nav>
    <a href="index.html" class="logo"><span class="logo-icon">💻</span><span class="logo-text">Clitus<span class="logo-accent">PC</span></span></a>
    <ul id="navMenu">
      <li><a href="index.html">Trang Chủ</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="ai-chat.html">🤖 AI Chat</a></li>
      <li><a href="arcade.html">🎮 Arcade</a></li>
      <li><a href="services.html">🛍️ Dịch Vụ</a></li>
      <li><a href="payment.html">💳 VIP</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
      <div class="nav-auth-slot"></div>
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>
</header>

<div class="tr-wrap" style="padding-top:5rem;">

  <!-- Page title -->
  <div style="text-align:center;margin-bottom:1.5rem;">
    <div style="font-size:2.5rem;margin-bottom:.3rem;">🌐</div>
    <h1 style="font-size:clamp(1.4rem,4vw,2rem);font-weight:900;background:linear-gradient(135deg,#667eea,#f093fb,#764ba2);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Dịch Thuật Chính Xác</h1>
    <p style="color:var(--sub);font-size:.9rem;margin-top:.3rem;">Powered by Google Translate · 20+ ngôn ngữ</p>
  </div>



  <!-- Lang selector bar -->
  <div class="lang-bar">
    <select id="srcLangSelect" style="flex:1;background:none;border:none;color:var(--text);font-size:.95rem;font-weight:600;cursor:pointer;outline:none;padding:.3rem;">
    </select>
    <button class="swap-btn" id="swapBtn" title="Đổi ngôn ngữ"><i class="fas fa-exchange-alt"></i></button>
    <select id="dstLangSelect" style="flex:1;background:none;border:none;color:var(--text);font-size:.95rem;font-weight:600;cursor:pointer;outline:none;padding:.3rem;">
    </select>
  </div>

  <!-- Panels -->
  <div class="tr-panels">
    <div class="tr-panel">
      <div class="tr-panel-header">
        <span id="srcLangLabel">Tiếng Việt</span>
        <div style="display:flex;gap:.3rem;">
          <button class="icon-btn" id="micBtn" title="Nhập bằng giọng nói"><i class="fas fa-microphone"></i></button>
          <button class="icon-btn" id="clearBtn" title="Xóa"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <textarea class="tr-textarea" id="srcText" placeholder="Nhập văn bản cần dịch..." maxlength="5000"></textarea>
      <div class="tr-panel-footer">
        <span class="char-count"><span id="charCount">0</span>/5000</span>
        <div class="panel-actions">
          <button class="icon-btn" id="copySrcBtn" title="Sao chép"><i class="fas fa-copy"></i></button>
          <button class="icon-btn" id="speakSrcBtn" title="Đọc to"><i class="fas fa-volume-up"></i></button>
        </div>
      </div>
    </div>

    <div class="tr-panel">
      <div class="tr-panel-header">
        <span id="dstLangLabel">Tiếng Anh</span>
        <span id="loadingIndicator" style="display:none;color:var(--g1);font-size:.8rem;" class="loading-dots">Đang dịch</span>
      </div>
      <textarea class="tr-textarea" id="dstText" placeholder="Bản dịch sẽ hiện ở đây..." readonly></textarea>
      <div class="tr-panel-footer">
        <span class="char-count" id="dstCharCount">0 ký tự</span>
        <div class="panel-actions">
          <button class="icon-btn" id="copyDstBtn" title="Sao chép bản dịch"><i class="fas fa-copy"></i></button>
          <button class="icon-btn" id="speakDstBtn" title="Đọc to bản dịch"><i class="fas fa-volume-up"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="tr-btn-wrap">
    <button class="tr-btn" id="translateBtn"><i class="fas fa-language"></i> Dịch Ngay</button>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-title">
      <span><i class="fas fa-history"></i> Lịch sử dịch</span>
      <button class="icon-btn" id="clearHistoryBtn" style="font-size:.75rem;">Xóa tất cả</button>
    </div>
    <div id="historyList"></div>
  </div>

</div>

<script>
const LANGS = {
  'vi':'Tiếng Việt','en':'Tiếng Anh','zh':'Tiếng Trung','ja':'Tiếng Nhật',
  'ko':'Tiếng Hàn','fr':'Tiếng Pháp','de':'Tiếng Đức','es':'Tiếng Tây Ban Nha',
  'it':'Tiếng Ý','pt':'Tiếng Bồ Đào Nha','ru':'Tiếng Nga','ar':'Tiếng Ả Rập',
  'th':'Tiếng Thái','id':'Tiếng Indonesia','ms':'Tiếng Mã Lai','hi':'Tiếng Hindi',
  'tr':'Tiếng Thổ Nhĩ Kỳ','nl':'Tiếng Hà Lan','pl':'Tiếng Ba Lan','sv':'Tiếng Thụy Điển'
};

let srcLang = 'vi', dstLang = 'en';
let history = JSON.parse(localStorage.getItem('tr_history') || '[]');
let translateTimer = null;

// Build selects
function buildSelects() {
  ['srcLangSelect','dstLangSelect'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = Object.entries(LANGS).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
  });
  document.getElementById('srcLangSelect').value = srcLang;
  document.getElementById('dstLangSelect').value = dstLang;
  updateLabels();
}

function updateLabels() {
  document.getElementById('srcLangLabel').textContent = LANGS[srcLang] || srcLang;
  document.getElementById('dstLangLabel').textContent = LANGS[dstLang] || dstLang;
}

// Translate
async function translate() {
  const text = document.getElementById('srcText').value.trim();
  if (!text) return;
  // Kiểm tra freemium
  if (window.freemium && !window.freemium.consume()) return;
  const btn = document.getElementById('translateBtn');
  const loading = document.getElementById('loadingIndicator');
  btn.disabled = true;
  loading.style.display = 'inline';
  document.getElementById('dstText').value = '';

  try {
    const result = await translateText(text, srcLang, dstLang);
    document.getElementById('dstText').value = result;
    document.getElementById('dstCharCount').textContent = result.length + ' ký tự';
    if (result && result !== text) {
      history.unshift({ src: text.slice(0,100), dst: result.slice(0,100), srcLang, dstLang, time: Date.now() });
      if (history.length > 20) history.pop();
      localStorage.setItem('tr_history', JSON.stringify(history));
      renderHistory();
    }
  } catch(e) {
    document.getElementById('dstText').value = 'Lỗi kết nối. Vui lòng thử lại.';
  }
  btn.disabled = false;
  loading.style.display = 'none';
}

// ── ENGINE: Google Translate unofficial (chính xác cao) ──
async function translateText(text, from, to) {
  // Thử Google Translate unofficial endpoint trước
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('google fail');
    const data = await res.json();
    // data[0] là mảng các đoạn dịch
    if (Array.isArray(data[0])) {
      return data[0].map(seg => seg[0] || '').join('');
    }
    throw new Error('parse fail');
  } catch(e1) {
    // Fallback: MyMemory
    try {
      const url2 = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
      const res2 = await fetch(url2);
      const data2 = await res2.json();
      const t = data2.responseData?.translatedText || '';
      if (t && t !== text) return t;
      throw new Error('mymemory fail');
    } catch(e2) {
      throw new Error('Tất cả engine đều lỗi');
    }
  }
}

// Auto translate on typing (debounce 800ms)
document.getElementById('srcText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length;
  clearTimeout(translateTimer);
  if (this.value.trim().length > 2) {
    translateTimer = setTimeout(translate, 800);
  }
});

document.getElementById('translateBtn').addEventListener('click', translate);

// Swap
document.getElementById('swapBtn').addEventListener('click', () => {
  const tmp = srcLang; srcLang = dstLang; dstLang = tmp;
  const srcText = document.getElementById('srcText').value;
  const dstText = document.getElementById('dstText').value;
  document.getElementById('srcText').value = dstText;
  document.getElementById('dstText').value = '';
  document.getElementById('charCount').textContent = dstText.length;
  document.getElementById('srcLangSelect').value = srcLang;
  document.getElementById('dstLangSelect').value = dstLang;
  updateLabels();
  if (dstText.trim()) translate();
});

// Select change
document.getElementById('srcLangSelect').addEventListener('change', function() {
  srcLang = this.value; updateLabels();
});
document.getElementById('dstLangSelect').addEventListener('change', function() {
  dstLang = this.value; updateLabels();
});



// Copy
document.getElementById('copySrcBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('srcText').value);
  showToast('Đã sao chép!');
});
document.getElementById('copyDstBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('dstText').value);
  showToast('Đã sao chép bản dịch!');
});

// Clear
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('srcText').value = '';
  document.getElementById('dstText').value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('dstCharCount').textContent = '0 ký tự';
});

// Speak
function speak(text, lang) {
  if (!text) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang === 'vi' ? 'vi-VN' : lang === 'zh' ? 'zh-CN' : lang === 'ja' ? 'ja-JP' : lang === 'ko' ? 'ko-KR' : 'en-US';
  speechSynthesis.speak(utt);
}
document.getElementById('speakSrcBtn').addEventListener('click', () => speak(document.getElementById('srcText').value, srcLang));
document.getElementById('speakDstBtn').addEventListener('click', () => speak(document.getElementById('dstText').value, dstLang));

// Mic
document.getElementById('micBtn').addEventListener('click', () => {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Trình duyệt không hỗ trợ nhập giọng nói'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = srcLang === 'vi' ? 'vi-VN' : 'en-US';
  rec.onresult = e => {
    document.getElementById('srcText').value = e.results[0][0].transcript;
    document.getElementById('charCount').textContent = document.getElementById('srcText').value.length;
    translate();
  };
  rec.start();
  showToast('Đang nghe...');
});

// History
function renderHistory() {
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!history.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = history.slice(0,10).map((h,i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="hi-langs">${LANGS[h.srcLang]||h.srcLang} → ${LANGS[h.dstLang]||h.dstLang}</div>
      <div class="hi-src">${h.src}${h.src.length>=100?'...':''}</div>
      <div class="hi-dst">${h.dst}${h.dst.length>=100?'...':''}</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  const h = history[i];
  srcLang = h.srcLang; dstLang = h.dstLang;
  document.getElementById('srcLangSelect').value = srcLang;
  document.getElementById('dstLangSelect').value = dstLang;
  document.getElementById('srcText').value = h.src;
  document.getElementById('charCount').textContent = h.src.length;
  updateLabels(); updateQuickLangs(); translate();
}

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  history = []; localStorage.removeItem('tr_history'); renderHistory();
});

// Theme — handled by nav.js

// Toast
function showToast(msg) {
  let t = document.getElementById('_tr_toast');
  if (!t) { t = document.createElement('div'); t.id='_tr_toast'; t.style.cssText='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#667eea;color:#fff;padding:.6rem 1.4rem;border-radius:50px;font-size:.85rem;font-weight:700;z-index:9999;transition:opacity .3s;'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2000);
}

buildSelects();
renderHistory();
</script>
<script src="dist/api.js"></script>
<script src="dist/auth.js"></script>
<script src="dist/nav.js"></script>
<script src="freemium.js"></script>
